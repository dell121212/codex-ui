<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>codex-ui · 公司选择</title>
<style>
:root {
  --bg0:#000; --bg1:#1c1c1e; --bg2:#2c2c2e;
  --sep-soft:rgba(255,255,255,.06); --sep:rgba(84,84,88,.65);
  --t1:#f5f5f7; --t2:rgba(235,235,245,.78); --t3:rgba(235,235,245,.48);
  --blue:#0a84ff;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:var(--font); background:#111; color:var(--t1); font-size:13px;
  display:flex; align-items:center; justify-content:center; min-height:100vh; padding:32px;
  -webkit-font-smoothing:antialiased;
}
.shell {
  width:380px; background:var(--bg0); border-radius:14px; overflow:hidden;
  border:0.5px solid var(--sep-soft); box-shadow:0 20px 50px rgba(0,0,0,.55);
}
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 12px; border-bottom:0.5px solid var(--sep-soft);
  background:linear-gradient(180deg,rgba(28,28,30,.96),rgba(28,28,30,.88));
}
.header-title { font-weight:600; font-size:15px; }
.header-acts { display:flex; gap:6px; }
.icon-btn {
  width:28px; height:28px; border-radius:8px; border:0.5px solid var(--sep);
  background:var(--bg2); color:var(--t2); display:grid; place-items:center; font-size:12px;
}
.chrome { padding:10px 12px 12px; }
.list {
  background:var(--bg1); border:0.5px solid var(--sep-soft); border-radius:12px; overflow:hidden;
}
.item {
  display:flex; align-items:center; gap:10px; padding:11px 12px;
  border-bottom:0.5px solid var(--sep-soft);
}
.item:last-child { border-bottom:0; }
.item.active { background:rgba(10,132,255,.10); }
.dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
.name { font-weight:600; font-size:13px; }
.sub { font-size:11px; color:var(--t3); margin-top:1px; }
.tag {
  margin-left:auto; font-size:11px; font-weight:600; color:var(--blue);
  background:rgba(10,132,255,.14); padding:3px 8px; border-radius:999px;
}
.tag.muted { color:var(--t3); background:rgba(120,120,128,.18); }
.hint {
  margin-top:10px; font-size:11px; color:var(--t3); line-height:1.45; padding:0 2px;
}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-title">codex-ui</div>
    <div class="header-acts">
      <div class="icon-btn">↻</div>
      <div class="icon-btn">−</div>
      <div class="icon-btn">✕</div>
    </div>
  </div>
  <div class="chrome">
    <div class="list">
      <div class="item active">
        <div class="dot" style="background:#10a37f"></div>
        <div>
          <div class="name">OpenAI</div>
          <div class="sub">Codex</div>
        </div>
        <div class="tag">42%</div>
      </div>
      <div class="item">
        <div class="dot" style="background:#e8e8e8"></div>
        <div>
          <div class="name">xAI</div>
          <div class="sub">Grok</div>
        </div>
        <div class="tag">78%</div>
      </div>
      <div class="item">
        <div class="dot" style="background:#f97316"></div>
        <div>
          <div class="name">Mistral</div>
          <div class="sub">Vibe</div>
        </div>
        <div class="tag">12k</div>
      </div>
      <div class="item">
        <div class="dot" style="background:#d97706"></div>
        <div>
          <div class="name">Anthropic</div>
          <div class="sub">Claude</div>
        </div>
        <div class="tag muted">就绪</div>
      </div>
      <div class="item">
        <div class="dot" style="background:#6366f1"></div>
        <div>
          <div class="name">月之暗面</div>
          <div class="sub">Kimi</div>
        </div>
        <div class="tag muted">就绪</div>
      </div>
      <div class="item">
        <div class="dot" style="background:#0ea5e9"></div>
        <div>
          <div class="name">智谱</div>
          <div class="sub">GLM</div>
        </div>
        <div class="tag muted">就绪</div>
      </div>
    </div>
    <div class="hint">已抓到 token / 官方额度的公司自动置顶 · 折叠选择器展开后切换</div>
  </div>
</div>
</body>
</html>
