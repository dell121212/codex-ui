<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>codex-ui · Grok</title>
<style>
:root {
  --bg0:#000; --bg1:#1c1c1e; --bg2:#2c2c2e;
  --sep-soft:rgba(255,255,255,.06); --sep:rgba(84,84,88,.65);
  --t1:#f5f5f7; --t2:rgba(235,235,245,.78); --t3:rgba(235,235,245,.48);
  --blue:#0a84ff;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",system-ui,sans-serif;
}
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:var(--font); background:#111; color:var(--t1); font-size:13px;
  display:flex; align-items:center; justify-content:center; min-height:100vh; padding:32px;
  -webkit-font-smoothing:antialiased;
}
.shell {
  width:380px; background:var(--bg0); border-radius:14px; overflow:hidden;
  border:0.5px solid var(--sep-soft); box-shadow:0 20px 50px rgba(0,0,0,.55);
}
.header {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 16px 12px; border-bottom:0.5px solid var(--sep-soft);
  background:linear-gradient(180deg,rgba(28,28,30,.96),rgba(28,28,30,.88));
}
.header-title { font-weight:600; font-size:15px; }
.header-acts { display:flex; gap:6px; }
.icon-btn {
  width:28px; height:28px; border-radius:8px; border:0.5px solid var(--sep);
  background:var(--bg2); color:var(--t2); display:grid; place-items:center; font-size:12px;
}
.chrome { padding:10px 12px 0; }
.company {
  display:flex; align-items:center; gap:10px; padding:10px 12px;
  background:var(--bg1); border:0.5px solid var(--sep-soft); border-radius:12px;
}
.dot { width:9px; height:9px; border-radius:50%; background:#e8e8e8; }
.cname { font-weight:600; font-size:13px; }
.csub { font-size:11px; color:var(--t3); }
.tag {
  margin-left:auto; font-size:11px; font-weight:600; color:#ff9f0a;
  background:rgba(255,159,10,.14); padding:3px 8px; border-radius:999px;
}
.chev { color:var(--t3); font-size:11px; margin-left:4px; }
.body { padding:12px; display:flex; flex-direction:column; gap:10px; }
.card {
  background:var(--bg1); border:0.5px solid var(--sep-soft); border-radius:14px; padding:14px;
}
.label { font-size:11px; font-weight:600; color:var(--t3); margin-bottom:8px; }
.head { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px; }
.pct { font-size:28px; font-weight:700; letter-spacing:-.8px; }
.reset { font-size:12px; color:var(--t2); }
.bar { height:8px; border-radius:999px; background:rgba(120,120,128,.28); overflow:hidden; margin:8px 0 10px; }
.fill { height:100%; border-radius:999px; }
.f78 { width:78%; background:rgb(201,82,101); }
.f75 { width:75%; background:rgb(194,85,107); }
.f3 { width:3%; background:rgb(17,130,249); }
.f20 { width:20.5%; background:rgb(60,122,212); }
.products { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:4px; }
.ph { display:flex; justify-content:space-between; font-size:12px; margin-bottom:4px; }
.ph span:last-child { font-weight:600; }
.stat { display:flex; justify-content:space-between; padding:3px 0; font-size:12px; }
.stat span:first-child { color:var(--t3); }
.stat span:last-child { font-weight:600; font-variant-numeric:tabular-nums; }
.note { font-size:11px; color:var(--t3); margin-top:6px; line-height:1.4; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-title">codex-ui</div>
    <div class="header-acts">
      <div class="icon-btn">↻</div>
      <div class="icon-btn">−</div>
      <div class="icon-btn">✕</div>
    </div>
  </div>
  <div class="chrome">
    <div class="company">
      <div class="dot"></div>
      <div>
        <div class="cname">xAI</div>
        <div class="csub">Grok</div>
      </div>
      <div class="tag">78%</div>
      <div class="chev">▾</div>
    </div>
  </div>
  <div class="body">
    <div class="card">
      <div class="label">周额度</div>
      <div class="head">
        <div class="pct">78%</div>
        <div class="reset">5天 16小时后重置</div>
      </div>
      <div class="bar"><div class="fill f78"></div></div>
      <div class="products">
        <div>
          <div class="ph"><span>Build</span><span>75%</span></div>
          <div class="bar" style="margin:0"><div class="fill f75"></div></div>
        </div>
        <div>
          <div class="ph"><span>Chat</span><span>3%</span></div>
          <div class="bar" style="margin:0"><div class="fill f3"></div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="head">
        <div class="label" style="margin:0">月额度</div>
        <div style="font-size:18px;font-weight:700">21%</div>
      </div>
      <div class="bar"><div class="fill f20"></div></div>
      <div class="stat"><span>已用</span><span>3.1k</span></div>
      <div class="stat"><span>上限</span><span>15.0k</span></div>
      <div class="stat"><span>剩余</span><span>11.9k</span></div>
      <div class="stat"><span>来源</span><span>官方 billing</span></div>
      <div class="note">cli-chat-proxy.grok.com/v1/billing · 非上下文窗口</div>
    </div>
  </div>
</div>
</body>
</html>
