<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>codex-ui mock</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
    background: #1c1c1e;
    color: #f5f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }
  .phone {
    width: 380px;
    border-radius: 18px;
    background: rgba(44,44,46,0.92);
    border: 0.5px solid rgba(255,255,255,0.12);
    box-shadow: 0 24px 80px rgba(0,0,0,0.55);
    overflow: hidden;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-bottom: 0.5px solid rgba(255,255,255,0.08);
  }
  .title { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .header-actions { display: flex; gap: 8px; color: #8e8e93; font-size: 13px; }
  .body { padding: 14px 14px 18px; }
  .company {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(58,58,60,0.9);
    border: 0.5px solid rgba(255,255,255,0.08);
    margin-bottom: 12px;
  }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #10a37f; }
  .company-name { font-size: 14px; font-weight: 600; }
  .company-sub { font-size: 11px; color: #8e8e93; }
  .tag {
    margin-left: auto;
    font-size: 11px;
    font-weight: 600;
    color: #0a84ff;
    background: rgba(10,132,255,0.12);
    padding: 3px 8px;
    border-radius: 999px;
  }
  .card {
    background: rgba(58,58,60,0.72);
    border: 0.5px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 14px;
    margin-bottom: 10px;
  }
  .label {
    font-size: 11px;
    font-weight: 600;
    color: #8e8e93;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 8px;
  }
  .row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .big { font-size: 28px; font-weight: 700; letter-spacing: -0.8px; }
  .muted { font-size: 12px; color: #8e8e93; }
  .bar {
    height: 8px;
    border-radius: 999px;
    background: rgba(120,120,128,0.28);
    overflow: hidden;
    margin: 8px 0 10px;
  }
  .fill {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #0a84ff, #ff453a);
  }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 4px 0;
  }
  .stat-row span:last-child { font-weight: 600; }
  .section-title {
    font-size: 12px;
    color: #8e8e93;
    margin: 12px 0 8px;
    font-weight: 600;
  }
  .model {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .model-name { font-size: 12px; flex: 1; }
  .model-bar {
    flex: 2;
    height: 6px;
    border-radius: 999px;
    background: rgba(120,120,128,0.28);
    overflow: hidden;
  }
  .model-fill { height: 100%; background: #0a84ff; border-radius: 999px; }
  .model-tok { font-size: 11px; color: #8e8e93; width: 42px; text-align: right; }
  .footer {
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: #636366;
    border-top: 0.5px solid rgba(255,255,255,0.06);
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="header">
      <div class="title">codex-ui</div>
      <div class="header-actions">↻ &nbsp; − &nbsp; ✕</div>
    </div>
    <div class="body">
      <div class="company">
        <div class="dot"></div>
        <div>
          <div class="company-name">OpenAI</div>
          <div class="company-sub">Codex · 自动抓取</div>
        </div>
        <div class="tag">42%</div>
      </div>

      <div class="card">
        <div class="label">5 小时</div>
        <div class="row">
          <div class="big">42%</div>
          <div class="muted">2小时 18分钟后重置</div>
        </div>
        <div class="bar"><div class="fill" style="width:42%"></div></div>
        <div class="stat-row"><span class="muted">已用</span><span>12.4k</span></div>
        <div class="stat-row"><span class="muted">剩余</span><span>17.1k</span></div>
      </div>

      <div class="card">
        <div class="row">
          <div class="label" style="margin:0">7 天</div>
          <div class="big" style="font-size:18px">67%</div>
        </div>
        <div class="bar"><div class="fill" style="width:67%"></div></div>
        <div class="stat-row"><span class="muted">已用</span><span>84.2k</span></div>
        <div class="stat-row"><span class="muted">重置</span><span>3天 6小时</span></div>
      </div>

      <div class="grid">
        <div class="card">
          <div class="label">今日</div>
          <div class="big" style="font-size:22px">~8.2k</div>
          <div class="muted">Token</div>
        </div>
        <div class="card">
          <div class="label">估价</div>
          <div class="big" style="font-size:22px">~$1.24</div>
          <div class="muted">本月会话</div>
        </div>
      </div>

      <div class="section-title">使用量排名</div>
      <div class="card">
        <div class="model">
          <div class="model-name">gpt-5.4</div>
          <div class="model-bar"><div class="model-fill" style="width:78%"></div></div>
          <div class="model-tok">62k</div>
        </div>
        <div class="model">
          <div class="model-name">gpt-5.3-codex</div>
          <div class="model-bar"><div class="model-fill" style="width:45%;background:#5e5ce6"></div></div>
          <div class="model-tok">36k</div>
        </div>
        <div class="model">
          <div class="model-name">o4-mini</div>
          <div class="model-bar"><div class="model-fill" style="width:22%;background:#30d158"></div></div>
          <div class="model-tok">18k</div>
        </div>
      </div>
    </div>
    <div class="footer">OpenAI · Claude · Grok · Mistral · 月之暗面 · 智谱</div>
  </div>
</body>
</html>
